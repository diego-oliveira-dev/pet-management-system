server:
  error:
    include-stacktrace: on-param

spring:
  application:
    name: pet-management-system
  datasource:
    url: ${DB_URL}?createDatabaseIfNotExist=true
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

logging:
  level:
    org.springframework: INFO